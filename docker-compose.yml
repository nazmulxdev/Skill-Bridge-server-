version: "3.9"

services:
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - INSTANCE_NAME=app-1
    expose:
      - "3000"
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
